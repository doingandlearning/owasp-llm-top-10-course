services:
  campaignbot:
    build: .
    container_name: campaignbot
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      CAMPAIGN_BOT_ROOT: /app
      LAB_DATA_DIR: /lab-data
      HOST: 0.0.0.0
      PORT: 8080
    volumes:
      - ../data:/lab-data:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
